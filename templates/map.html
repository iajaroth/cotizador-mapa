<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>STS - Mapa de Cámaras</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0b1a28;--surface:#0d1f30;--surface2:#112a3d;--gold:#d49b2c;--text:#e0e0e0;--muted:#888;--danger:#c0392b;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{display:flex;flex-direction:column}

/* Top bar — minimal */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;padding-top:max(8px,env(safe-area-inset-top));background:var(--surface);border-bottom:2px solid var(--gold);z-index:10;flex-shrink:0}
.topbar h1{font-size:14px;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;min-width:44px;min-height:44px;padding:8px 14px;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-gold{background:var(--gold);color:var(--bg)}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.btn-danger{background:var(--danger);color:#fff}
.btn:disabled{opacity:.35;pointer-events:none}
.btn:active{opacity:.8}

/* Search bar — full width, fixed below topbar */
.search-wrap{padding:8px 12px;background:var(--surface);flex-shrink:0;z-index:9}
.search-input{width:100%;padding:12px 14px;border:1px solid #1a3a50;border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:15px;outline:none}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--gold)}
.search-results{display:none;background:var(--surface2);border:1px solid #1a3a50;border-radius:0 0 var(--radius) var(--radius);max-height:200px;overflow-y:auto;margin-top:-2px}
.search-results.show{display:block}
.search-results .item{padding:12px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #1a3a50}
.search-results .item:last-child{border-bottom:none}
.search-results .item:active,.search-results .item:hover{background:#1a3a50;color:var(--gold)}

/* Map — takes remaining space */
#map{flex:1;width:100%;min-height:0}

/* Bottom panel — slide-up */
.panel{position:fixed;bottom:0;left:0;right:0;z-index:20;background:var(--surface);border-top:2px solid var(--gold);border-radius:var(--radius) var(--radius) 0 0;max-height:50vh;overflow-y:auto;transition:transform .25s ease;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.panel.hidden{transform:translateY(100%)}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;position:sticky;top:0;background:var(--surface);z-index:2}
.panel-header .title{font-size:14px;font-weight:600;color:var(--gold)}
.badge{background:var(--gold);color:var(--bg);padding:2px 10px;border-radius:10px;font-size:12px;font-weight:700}
.panel-body{padding:0 14px 14px}
.pin-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:13px;min-height:48px}
.pin-row:active{opacity:.8}
.pin-row.selected{border:1px solid var(--gold);background:#1a3a50}
.pin-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.pin-type{background:var(--bg);color:var(--text);border:1px solid #1a3a50;border-radius:6px;padding:4px 8px;font-size:12px;margin-left:auto}

/* FAB */
.fab{position:fixed;bottom:24px;right:16px;z-index:30;width:56px;height:56px;border-radius:50%;background:var(--gold);color:var(--bg);border:none;font-size:26px;box-shadow:0 4px 16px rgba(0,0,0,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;padding-bottom:max(0px,env(safe-area-inset-bottom))}
.fab:active{transform:scale(.92)}
.fab .label{position:absolute;right:68px;background:var(--surface);color:var(--gold);padding:6px 12px;border-radius:8px;font-size:12px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s}
.fab:active .label,.fab:hover .label{opacity:1}

/* Status badge */
.status{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:15;padding:6px 16px;border-radius:14px;font-size:12px;font-weight:600;background:var(--surface);border:1px solid var(--gold);color:var(--gold);pointer-events:none;transition:opacity .3s}
.status.locked{color:var(--danger);border-color:var(--danger)}

/* Desktop */
@media(min-width:768px){
  body{flex-direction:row;flex-wrap:wrap}
  .topbar{width:100%}
  .search-wrap{position:absolute;top:56px;left:16px;width:360px;background:transparent;padding:0;z-index:15}
  .search-input{background:var(--surface);box-shadow:0 2px 12px rgba(0,0,0,.4)}
  .search-results{background:var(--surface)}
  .panel{position:relative;width:340px;border-top:none;border-left:2px solid var(--gold);border-radius:0;max-height:none;transform:none!important;flex-shrink:0;overflow-y:auto}
  .panel.hidden{transform:none!important}
  .panel-header{cursor:default}
  .fab{bottom:24px;right:360px}
  .map-wrap{flex:1;position:relative}
  #map{height:100%}
}

/* Leaflet overrides */
.leaflet-control-zoom{display:none}
.leaflet-control-attribution{font-size:9px!important;background:rgba(0,0,0,.5)!important;color:#666!important}
.leaflet-control-attribution a{color:#888!important}
.custom-marker{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.6);font-size:16px;font-weight:700;color:#fff}
.custom-marker span{transform:rotate(45deg)}

/* Animate pin placement */
@keyframes pop{0%{transform:rotate(-45deg) scale(0)}70%{transform:rotate(-45deg) scale(1.1)}100%{transform:rotate(-45deg) scale(1)}}
.marker-pop .custom-marker{animation:pop .3s ease}
</style>
</head>
<body>

<div class="topbar">
  <h1 id="propName">🗺️ STS Security</h1>
  <div class="actions">
    <button class="btn btn-outline" id="btnLock" onclick="doLock()" disabled>✅ Confirmar</button>
  </div>
</div>

<div class="search-wrap">
  <input type="search" class="search-input" id="search" placeholder="🔍 Buscar ubicación..." autocomplete="off" autocorrect="off">
  <div class="search-results" id="results"></div>
</div>

<div id="map"></div>

<div class="panel hidden" id="panel">
  <div class="panel-header" onclick="togglePanel()">
    <span class="title">📷 Cámaras colocadas</span>
    <span class="badge" id="count">0</span>
  </div>
  <div class="panel-body" id="pinList"></div>
</div>

<button class="fab" id="fab" onclick="togglePinMode()">
  <span class="label" id="fabLabel">Colocar cámara</span>
  📍
</button>
<div class="status" id="status">Tocá el mapa para colocar cámaras</div>

<script>
const SID=window.location.pathname.split('/map/')[1]||'demo';
const API=window.location.origin;
let map,session,sel=-1,pinMode=false,searchTimer=null;

const T={camera:{l:'📷 Cámara',c:'#d49b2c'},videoportero:{l:'🔔 Videoportero',c:'#2ecc71'},porton:{l:'🚪 Portón',c:'#3498db'},antena:{l:'📡 Antena',c:'#9b59b6'},nvr:{l:'🖥️ NVR',c:'#e74c3c'}};

async function init(){
  try{const r=await fetch(API+'/api/session/'+SID);session=r.ok?await r.json():{}}catch(e){session={}}
  session=session||{};session.pins=session.pins||[];session.map_center=session.map_center||{lat:9.9281,lng:-84.0907};session.zoom=session.zoom||15;session.locked=!!session.locked;
  document.getElementById('propName').textContent=session.property_name||'STS Security';

  map=L.map('map',{zoomControl:false,attributionControl:true}).setView([session.map_center.lat,session.map_center.lng],session.zoom);
  L.control.zoom({position:'bottomleft'}).addTo(map);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:20}).addTo(map);

  map.on('click',e=>{if(pinMode){addPin(e.latlng.lat,e.latlng.lng);pinMode=false;updateFab()}});
  map.on('moveend',()=>{session.map_center=map.getCenter();session.zoom=map.getZoom();save()});
  renderPins();
  if(session.locked)lockUI();

  // Search with debounce
  document.getElementById('search').addEventListener('input',function(){
    clearTimeout(searchTimer);
    const q=this.value.trim();
    if(q.length<2){document.getElementById('results').classList.remove('show');return}
    searchTimer=setTimeout(()=>search(q),300);
  });
}

async function search(q){
  try{
    const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q+', Costa Rica')+'&limit=5&addressdetails=1');
    const data=await r.json();
    const div=document.getElementById('results');
    div.innerHTML=data.map((d,i)=>'<div class="item" onclick="selectResult('+i+')">'+d.display_name+'</div>').join('');
    div.classList.add('show');
    window._searchData=data;
  }catch(e){}
}

function selectResult(i){
  const d=window._searchData[i];if(!d)return;
  const lat=parseFloat(d.lat),lng=parseFloat(d.lon);
  map.setView([lat,lng],18);
  // Auto-place pin at location
  addPin(lat,lng);
  document.getElementById('results').classList.remove('show');
  document.getElementById('search').value=d.display_name.split(',')[0];
  document.getElementById('propName').textContent=d.display_name.split(',')[0];
  session.property_name=d.display_name.split(',')[0];
  document.getElementById('panel').classList.remove('hidden');
}

function addPin(lat,lng){
  if(session.locked)return;
  session.pins.push({lat,lng,type:'camera',label:'',color:T.camera.c,added_at:new Date().toISOString()});
  save();renderPins();
  document.getElementById('panel').classList.remove('hidden');
  document.getElementById('status').textContent='📷 ¡Cámara colocada! ('+session.pins.length+' total)';
  setTimeout(()=>document.getElementById('status').style.opacity='0',2000);
  document.getElementById('status').style.opacity='1';
}

function renderPins(){
  map.eachLayer(l=>{if(l instanceof L.Marker)map.removeLayer(l)});
  const list=document.getElementById('pinList');list.innerHTML='';
  document.getElementById('count').textContent=session.pins.length;

  session.pins.forEach((p,i)=>{
    const icon=L.divIcon({className:'custom-marker',html:'<span>'+(i+1)+'</span>',iconSize:[36,36],iconAnchor:[18,36]});
    const m=L.marker([p.lat,p.lng],{draggable:!session.locked,icon}).addTo(map)
      .bindPopup('<b>'+T[p.type].l+' #'+(i+1)+'</b><br><small>'+p.lat.toFixed(5)+', '+p.lng.toFixed(5)+'</small>');
    if(!session.locked)m.on('dragend',e=>{const pos=e.target.getLatLng();session.pins[i].lat=pos.lat;session.pins[i].lng=pos.lng;save()});

    const div=document.createElement('div');div.className='pin-row'+(i===sel?' selected':'');
    div.innerHTML='<span class="pin-dot" style="background:'+p.color+'"></span><span style="flex:1">'+T[p.type].l+' #'+(i+1)+'</span>'+
      (session.locked?'':'<select class="pin-type" onchange="changeType('+i+',this.value)">'+Object.entries(T).map(([k,v])=>'<option value="'+k+'"'+(p.type===k?' selected':'')+'>'+v.l+'</option>').join('')+'</select>')+
      (!session.locked?'<button onclick="removePin('+i+')" style="background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:4px 8px">✕</button>':'');
    div.onclick=e=>{if(e.target.tagName==='SELECT'||e.target.tagName==='BUTTON')return;sel=i;renderPins();map.setView([p.lat,p.lng],19)};
    list.appendChild(div);
  });

  document.getElementById('btnLock').disabled=session.locked||session.pins.length===0;
}

function changeType(i,t){session.pins[i].type=t;session.pins[i].color=T[t].c;save();renderPins()}
function removePin(i){if(session.locked)return;session.pins.splice(i,1);sel=-1;save();renderPins()}

async function save(){
  await fetch(API+'/api/session/'+SID,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(session)}).catch(()=>{});
}

function togglePinMode(){
  if(session.locked)return;
  pinMode=!pinMode;updateFab();
  if(pinMode){
    document.getElementById('status').textContent='👆 Tocá el mapa para colocar la cámara';
    document.getElementById('status').style.opacity='1';
  }
}
function updateFab(){
  const f=document.getElementById('fab');const l=document.getElementById('fabLabel');
  l.textContent=pinMode?'Tocá el mapa':'Colocar cámara';
}

function togglePanel(){
  document.getElementById('panel').classList.toggle('hidden');
}

async function doLock(){
  if(!session.pins.length)return;
  if(!confirm('¿Bloquear mapa con '+session.pins.length+' cámaras? No se podrá modificar.'))return;
  await fetch(API+'/api/session/'+SID+'/lock',{method:'POST'});
  session.locked=true;lockUI();
}
function lockUI(){
  document.getElementById('status').textContent='🔒 MAPA BLOQUEADO';
  document.getElementById('status').classList.add('locked');
  document.getElementById('btnLock').disabled=true;document.getElementById('btnLock').textContent='🔒';
  document.getElementById('fab').style.display='none';
  document.getElementById('search').disabled=true;
  pinMode=false;
}

// Show panel by default on desktop
if(window.innerWidth>=768)document.getElementById('panel').classList.remove('hidden');
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1a28">
<title>STS - Mapa de Cámaras</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0b1a28;--s1:#0d1f30;--s2:#112a3d;--g:#d49b2c;--t:#e0e0e0;--m:#888;--r:12px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{display:flex;flex-direction:column;position:relative}

/* ===== FULLSCREEN MAP ===== */
#map{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}

/* ===== TOP BAR — overlay ===== */
.topbar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;padding-top:calc(8px + var(--safe-top));background:linear-gradient(180deg,rgba(11,26,40,.95) 60%,rgba(11,26,40,0) 100%)}
.topbar h1{font-size:14px;color:var(--g);max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;min-width:40px;min-height:40px;padding:6px 12px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.95);opacity:.8}
.btn-g{background:var(--g);color:var(--bg)}
.btn-o{background:rgba(13,31,48,.9);border:1px solid var(--g);color:var(--g);backdrop-filter:blur(8px)}
.btn:disabled{opacity:.3;pointer-events:none}

/* ===== SEARCH — overlay below topbar ===== */
.search-bar{position:absolute;top:calc(52px + var(--safe-top));left:8px;right:8px;z-index:20;display:flex;flex-direction:column}
.search-input{width:100%;padding:10px 14px;border:1px solid rgba(255,255,255,.15);border-radius:10px;background:rgba(13,31,48,.92);color:var(--t);font-size:14px;outline:none;backdrop-filter:blur(8px)}
.search-input::placeholder{color:var(--m)}
.search-input:focus{border-color:var(--g)}
.search-drop{display:none;background:rgba(17,42,61,.95);border:1px solid rgba(255,255,255,.1);border-radius:0 0 10px 10px;max-height:180px;overflow-y:auto;backdrop-filter:blur(8px)}
.search-drop.show{display:block}
.search-drop .item{padding:11px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(255,255,255,.05);min-height:44px;display:flex;align-items:center}
.search-drop .item:last-child{border:none}
.search-drop .item:active,.search-drop .item:hover{background:rgba(212,155,44,.2);color:var(--g)}

/* ===== STATUS TOAST ===== */
.toast{position:absolute;top:calc(110px + var(--safe-top));left:50%;transform:translateX(-50%);z-index:25;padding:6px 16px;border-radius:14px;font-size:12px;font-weight:600;background:rgba(13,31,48,.9);border:1px solid var(--g);color:var(--g);pointer-events:none;opacity:0;transition:opacity .3s;backdrop-filter:blur(8px)}
.toast.show{opacity:1}
.toast.locked{color:#e74c3c;border-color:#e74c3c}

/* ===== FAB — Add Camera ===== */
.fab-container{position:absolute;bottom:calc(24px + var(--safe-bot));right:16px;z-index:30;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.fab{width:52px;height:52px;border-radius:50%;background:var(--g);color:var(--bg);border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;transition:transform .15s,background .2s}
.fab:active{transform:scale(.9)}
.fab.active{background:#e74c3c;box-shadow:0 0 20px rgba(231,76,60,.4)}
.fab-hint{position:absolute;right:64px;top:50%;transform:translateY(-50%);background:rgba(13,31,48,.9);color:var(--t);padding:6px 12px;border-radius:8px;font-size:12px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;backdrop-filter:blur(8px)}
.fab.active .fab-hint,.fab-container:active .fab-hint{opacity:1}
.fab-actions{display:flex;flex-direction:column;gap:6px;opacity:0;transform:translateY(10px);transition:all .2s;pointer-events:none}
.fab-container.open .fab-actions{opacity:1;transform:translateY(0);pointer-events:auto}
.fab-action{width:44px;height:44px;border-radius:50%;background:rgba(13,31,48,.9);border:1px solid rgba(255,255,255,.15);color:var(--t);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.fab-action:active{background:var(--g);color:var(--bg)}

/* ===== BOTTOM SHEET — Camera list ===== */
.sheet{position:absolute;bottom:0;left:0;right:0;z-index:15;background:rgba(13,31,48,.97);border-top:2px solid var(--g);border-radius:14px 14px 0 0;max-height:45vh;display:flex;flex-direction:column;transform:translateY(calc(100% - 48px));transition:transform .3s ease;padding-bottom:var(--safe-bot)}
.sheet.expanded{transform:translateY(0)}
.sheet-handle{display:flex;align-items:center;justify-content:center;padding:10px;cursor:pointer;min-height:48px;flex-shrink:0}
.sheet-handle-bar{width:36px;height:4px;border-radius:2px;background:var(--m)}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:0 14px 8px;flex-shrink:0}
.sheet-title{font-size:13px;font-weight:600;color:var(--g)}
.sheet-badge{background:var(--g);color:var(--bg);padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700}
.sheet-body{flex:1;overflow-y:auto;padding:0 12px 12px;-webkit-overflow-scrolling:touch}
.pin-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s2);border-radius:8px;margin-bottom:5px;cursor:pointer;min-height:48px;font-size:13px}
.pin-card:active{opacity:.7}
.pin-card.selected{border:1px solid var(--g)}
.pin-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.pin-type-sel{background:var(--bg);color:var(--t);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:3px 6px;font-size:11px;margin-left:auto}
.pin-del{background:none;border:none;color:var(--m);font-size:16px;cursor:pointer;padding:4px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.pin-del:active{color:#e74c3c}
.sheet-actions{display:flex;gap:8px;padding:8px 12px;border-top:1px solid rgba(255,255,255,.05);flex-shrink:0}

/* ===== DESKTOP ===== */
@media(min-width:768px){
  .search-bar{left:50%;transform:translateX(-50%);max-width:440px}
  .sheet{left:auto;width:350px;border-left:2px solid var(--g);border-radius:14px 0 0 0;max-height:none;transform:none!important;padding-bottom:0}
  .sheet-handle{display:none}
  .fab-container{bottom:24px;right:374px}
}
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <h1 id="propName">🗺️ STS Security</h1>
  <button class="btn btn-g" id="btnLock" onclick="doLock()" disabled>✅</button>
</div>

<div class="search-bar">
  <input type="search" class="search-input" id="search" placeholder="🔍 Buscar ubicación..." autocomplete="off" autocorrect="off">
  <div class="search-drop" id="results"></div>
</div>

<div class="toast" id="toast">Tocá el mapa para colocar cámaras</div>

<div class="fab-container" id="fabContainer">
  <div class="fab-actions">
    <button class="fab-action" onclick="undoPin()" title="Deshacer">↩</button>
    <button class="fab-action" onclick="toggleSheet()" title="Lista">📋</button>
  </div>
  <button class="fab" id="fab" onclick="togglePinMode()">
    <span class="fab-hint" id="fabHint">Colocar cámara</span>
    📍
  </button>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-handle" onclick="toggleSheet()">
    <div class="sheet-handle-bar"></div>
  </div>
  <div class="sheet-header">
    <span class="sheet-title">📷 Cámaras</span>
    <span class="sheet-badge" id="count">0</span>
  </div>
  <div class="sheet-body" id="pinList"></div>
  <div class="sheet-actions">
    <button class="btn btn-o" onclick="doLock()" id="btnLock2" style="flex:1" disabled>✅ Confirmar y bloquear</button>
  </div>
</div>

<script>
const SID=window.location.pathname.split('/map/')[1]||'demo';
const API=window.location.origin;
let map,session,sel=-1,pinMode=false,timer=null;

const TYPES={camera:{l:'📷 Cámara',c:'#d49b2c'},videoportero:{l:'🔔 Videoportero',c:'#2ecc71'},porton:{l:'🚪 Portón',c:'#3498db'},antena:{l:'📡 Antena',c:'#9b59b6'},nvr:{l:'🖥️ NVR',c:'#e74c3c'}};

async function init(){
  try{const r=await fetch(API+'/api/session/'+SID);session=r.ok?await r.json():{}}catch(e){session={}}
  session.pins=session.pins||[];session.map_center=session.map_center||{lat:9.9281,lng:-84.0907};session.zoom=session.zoom||15;session.locked=!!session.locked;
  document.getElementById('propName').textContent=session.property_name||'STS Security';

  map=L.map('map',{zoomControl:false,attributionControl:true}).setView([session.map_center.lat,session.map_center.lng],session.zoom);
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:20}).addTo(map);

  map.on('click',e=>{if(!pinMode)return;addPin(e.latlng.lat,e.latlng.lng);pinMode=false;updateFab()});
  renderPins();
  if(session.locked)lockUI();
  if(session.pins.length)document.getElementById('sheet').classList.add('expanded');
  if(window.innerWidth>=768)document.getElementById('sheet').classList.add('expanded');

  document.getElementById('search').addEventListener('input',function(){
    clearTimeout(timer);const q=this.value.trim();
    if(q.length<2){document.getElementById('results').classList.remove('show');return}
    timer=setTimeout(()=>search(q),300);
  });
}

async function search(q){
  try{
    const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q+', Costa Rica')+'&limit=5&addressdetails=1');
    const data=await r.json();window._sd=data;
    const d=document.getElementById('results');
    d.innerHTML=data.map((x,i)=>'<div class="item" onclick="selectResult('+i+')">'+x.display_name+'</div>').join('');
    d.classList.add('show');
  }catch(e){}
}

function selectResult(i){
  const d=window._sd[i];if(!d)return;
  const lat=parseFloat(d.lat),lng=parseFloat(d.lon);
  map.setView([lat,lng],18);
  addPin(lat,lng);
  document.getElementById('results').classList.remove('show');
  document.getElementById('search').value=d.display_name.split(',')[0];
  document.getElementById('propName').textContent=d.display_name.split(',')[0];
  session.property_name=d.display_name.split(',')[0];
  toast('📍 Cámara colocada en '+d.display_name.split(',')[0]);
}

function addPin(lat,lng){
  if(session.locked)return;
  session.pins.push({lat,lng,type:'camera',label:'',color:TYPES.camera.c,added_at:new Date().toISOString()});
  save();renderPins();expandSheet();
}

function undoPin(){if(session.locked||!session.pins.length)return;session.pins.pop();sel=-1;save();renderPins();toast('↩ Deshecho')}
function expandSheet(){document.getElementById('sheet').classList.add('expanded')}

function renderPins(){
  map.eachLayer(l=>{if(l instanceof L.Marker)map.removeLayer(l)});
  const list=document.getElementById('pinList');list.innerHTML='';
  document.getElementById('count').textContent=session.pins.length;

  session.pins.forEach((p,i)=>{
    const icon=L.divIcon({className:'',html:'<div style="background:'+p.color+';width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:14px;font-weight:700">'+(i+1)+'</span></div>',iconSize:[32,32],iconAnchor:[16,32]});
    const m=L.marker([p.lat,p.lng],{draggable:!session.locked,icon}).addTo(map);
    m.bindPopup('<b>'+TYPES[p.type].l+' #'+(i+1)+'</b>');
    if(!session.locked)m.on('dragend',e=>{const pos=e.target.getLatLng();session.pins[i].lat=pos.lat;session.pins[i].lng=pos.lng;save()});

    const div=document.createElement('div');div.className='pin-card'+(i===sel?' selected':'');
    div.innerHTML='<span class="pin-dot" style="background:'+p.color+'"></span><span style="flex:1">'+TYPES[p.type].l+' #'+(i+1)+'</span>'+
      (session.locked?'':'<select class="pin-type-sel" onchange="changeType('+i+',this.value)">'+Object.entries(TYPES).map(([k,v])=>'<option value="'+k+'"'+(p.type===k?' selected':'')+'>'+v.l+'</option>').join('')+'</select>')+
      (!session.locked?'<button class="pin-del" onclick="event.stopPropagation();removePin('+i+')">✕</button>':'');
    div.onclick=e=>{if(e.target.tagName==='SELECT'||e.target.tagName==='BUTTON')return;sel=i;renderPins();map.setView([p.lat,p.lng],19)};
    list.appendChild(div);
  });

  const n=session.pins.length;
  document.getElementById('btnLock').disabled=session.locked||n===0;
  document.getElementById('btnLock').textContent=n?n:'✅';
  document.getElementById('btnLock2').disabled=session.locked||n===0;
}

function changeType(i,t){session.pins[i].type=t;session.pins[i].color=TYPES[t].c;save();renderPins()}
function removePin(i){if(session.locked)return;session.pins.splice(i,1);sel=-1;save();renderPins()}
async function save(){await fetch(API+'/api/session/'+SID,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(session)}).catch(()=>{})}

function togglePinMode(){
  if(session.locked)return;
  pinMode=!pinMode;updateFab();
  if(pinMode)toast('👆 Tocá en el mapa para colocar la cámara');
}

function updateFab(){
  document.getElementById('fab').classList.toggle('active',pinMode);
  document.getElementById('fabHint').textContent=pinMode?'Tocá el mapa':'Colocar cámara';
  document.getElementById('fabContainer').classList.toggle('open',pinMode);
}

function toggleSheet(){
  document.getElementById('sheet').classList.toggle('expanded');
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

async function doLock(){
  if(!session.pins.length)return;
  if(!confirm('¿Bloquear mapa con '+session.pins.length+' cámara(s)? No se podrá modificar.'))return;
  await fetch(API+'/api/session/'+SID+'/lock',{method:'POST'});
  session.locked=true;lockUI();toast('🔒 Mapa bloqueado');
}
function lockUI(){
  document.getElementById('btnLock').disabled=true;document.getElementById('btnLock').textContent='🔒';
  document.getElementById('btnLock2').disabled=true;document.getElementById('fab').style.display='none';
  document.getElementById('search').disabled=true;pinMode=false;
}

if(window.innerWidth>=768)document.getElementById('sheet').classList.add('expanded');
init();
</script>
</body>
</html>
